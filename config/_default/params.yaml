# SITE SETUP
# Guide: https://docs.hugoblox.com/tutorial/
# Documentation: https://docs.hugoblox.com/
# YAML syntax: https://learnxinyminutes.com/docs/yaml/

# Appearance
appearance:
  mode: light # Options: light, dark, system
  color: teal # Theme color (kept from template)

marketing:
  seo:
    site_type: Person
    local_business_type: Physician
    org_name: 'Αγγειοχειρουργός Πάτρα & Αγρίνιο | Ευάγγελος Αλεξίου'
    description: 'Αγγειοχειρουργός Πάτρα και Αγγειοχειρουργός Αγρίνιο: ο Ευάγγελος Αλεξίου είναι Επιμελητής Α΄ Αγγειοχειρουργός στο Πανεπιστημιακό Γενικό Νοσοκομείο Πατρών και διατηρεί ιδιωτικό ιατρείο στο Αγρίνιο. Εξειδίκευση σε ενδαγγειακές και ανοιχτές επεμβάσεις αρτηριών και φλεβών, καρωτίδα, ανευρύσματα αορτής, φλεβική ανεπάρκεια, διαβητικό πόδι και αγγειακή προσπέλαση αιμοκάθαρσης.'
    twitter: '' # Προαιρετικά: π.χ. 'vanalex'
  analytics:
    google_analytics: 'G-N4WQF5875H' # π.χ. G-XXXXXXXX
    baidu_tongji: ''
    plausible: ''
    fathom: ''
    pirsch: ''
  verification:
    google: '' # Google Search Console token
    baidu: ''

header:
  navbar:
    enable: true
    block: 'navbar'
    fixed_to_top: true
    show_search: true
    show_theme_chooser: true
    logo:
      text: '' # hide text
      filename: 'logo.png' # <-- file lives in assets/media/

# Site footer
footer:
  enable: false # 👈 Σωστή εσοχή: κρύβει ολόκληρο το footer (αν υποστηρίζεται)
  copyright:
    notice: '© {year} Ευάγγελος Αλεξίου. This work is licensed under {license}'
    license:
      enable: true # Κάν’ το false για να μη φαίνεται καθόλου γραμμή άδειας
      allow_derivatives: false
      share_alike: false
      allow_commercial: false

# Localization
locale:
  # Προσοχή: τα ελληνικά ονόματα μηνών απαιτούν i18n. Αυτό είναι Go time format.
  date_format: '2 January 2006'
  time_format: '15:04'

# Site features
features:
  math:
    enable: false
  privacy_pack:
    enable: true # Για banner θα χρειαστεί και config/_default/privacy.yaml
